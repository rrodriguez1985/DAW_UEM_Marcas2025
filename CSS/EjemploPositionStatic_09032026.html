<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
        }
        .container div{
            width: 100px;
            height: 100px;
            text-align: center;
            color:azure;
            font-size: 14px;
            position:static;
            /*Recordar: cuando aplicamos posicionamiento, por norma general,
            este se aplica a los elementos top, bottom, right y left de estos.
            En el caso de posicionamiento Static, No se aplica a top, bottom,
            right ni left.
            static = Posicionamiento por defecto, es como si no aplicaramos nada.*/
        }
        .container div:nth-child(2n){
            background-color: blue;
        }
        .container div:nth-child(2n+1){
            background-color: crimson;
        }
    </style>
    <title>Position Static</title>
</head>
<body>
    <div class="container">
        <div>Uno</div>
        <div>Dos</div>
        <div>Tres</div>
        <div>Cuatro</div>
        <div>Cinco</div>
        <div>Seis</div>
        <div>Siete</div>
        <div>Ocho</div>
        <div>Nueve</div>
    </div>
</body>
</html>
