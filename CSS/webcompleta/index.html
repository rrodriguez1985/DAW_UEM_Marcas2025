<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cafetería DAW</title>
</head>
<body>
    <!--Header: es un div o caja, que representa los elementos principales que irán en la cabecera
    de nuestra página web-->
    <header class="header">
        <h1>Café DAW</h1>
        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="#">Productos</a>
            <a href="formulario.html">Contacto</a>
        </nav>
    </header>
    <!--Insertamos secciones con los apartados que deseamos tener en nuestra web-->
    <section class="banner">
        <img src="img/banner.jpg" alt="cafe">
        <h2>El mejor café de desarrollo de toda la UEM</h2>
    </section>
    <section class="productos">
        <div class="card">
            <img src="img/espresso.jpg" alt="">
            <h3>Espresso</h3>
            <p>PVP: 1.80€</p>
        </div>
        <div class="card">
            <img src="img/latte.jpg" alt="">
            <h3>Latte</h3>
            <p>PVP: 3.50€</p>
        </div>
        <div class="card">
            <img src="img/capuccino.jpg" alt="">
            <h3>Capuccino</h3>
            <p>PVP: 2.50€</p>
        </div>
    </section>
    <footer class="footer">
        @ 1º DAW Materia Lenguaje de Marcas y Sistemas de Gestión 2026
    </footer>
</body>
</html>
